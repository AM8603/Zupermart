<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zupermart - Shop More. Save More.</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy: #1a2a47;
            --orange: #FF9500;
            --white: #ffffff;
            --light-gray: #f8f9fa;
            --text: #2c3e50;
            --border: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            color: var(--text);
            line-height: 1.6;
            background-color: var(--light-gray);
        }
        header {
            background: var(--white);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 1rem 2rem;
        }
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 800;
            cursor: pointer;
        }
        .logo img {
            height: 50px;
            width: auto;
        }
        .logo-text h1 {
            font-size: 1.4rem;
            color: var(--navy);
        }
        .logo-text p {
            font-size: 0.7rem;
            color: var(--orange);
            font-weight: 700;
        }
        /* ========== CAROUSEL ========== */
        .carousel-container {
            position: relative;
            width: 100%;
            height: 500px;
            background: linear-gradient(135deg, var(--navy) 0%, rgba(26, 42, 71, 0.9) 100%);
            overflow: hidden;
            min-height: 300px;
        }
        .carousel {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .carousel-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease;
            display: flex;
            align-items: center;
        }
        .carousel-slide.active {
            opacity: 1;
        }
        .carousel-slide::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: var(--orange);
            border-radius: 50%;
            opacity: 0.08;
            right: -100px;
            top: -100px;
        }
        .carousel-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
            position: relative;
            z-index: 2;
            width: 100%;
        }
        .carousel-text h2 {
            font-size: 3.5rem;
            color: var(--white);
            margin-bottom: 1rem;
            font-weight: 800;
        }
        .carousel-text p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 2rem;
        }
        .carousel-btn {
            display: inline-block;
            background: var(--orange);
            color: var(--white);
            padding: 1rem 2.5rem;
            border-radius: 6px;
            font-weight: 600;
            text-transform: uppercase;
            border: 2px solid var(--orange);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .carousel-btn:hover {
            background: transparent;
            color: var(--orange);
        }
        .carousel-image {
            text-align: center;
            font-size: 5rem;
        }
        .carousel-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .carousel-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .carousel-dot.active {
            background: var(--orange);
            transform: scale(1.3);
        }
        /* ========== CATEGORIES ========== */
        .categories-section {
            padding: 4rem 2rem;
            background: var(--white);
        }
        .section-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .section-header h2 {
            font-size: 2.5rem;
            color: var(--navy);
            margin-bottom: 1rem;
            font-weight: 800;
        }
        .section-header h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: var(--orange);
            border-radius: 2px;
            margin: 1rem auto 0;
        }
        .categories-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            min-height: 250px;
        }
        .category-card {
            background: linear-gradient(135deg, var(--navy) 0%, rgba(26, 42, 71, 0.8) 100%);
            border-radius: 12px;
            padding: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            color: var(--white);
            text-decoration: none;
        }
        .category-card::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: var(--orange);
            border-radius: 50%;
            opacity: 0.1;
            top: -100px;
            right: -100px;
            transition: all 0.3s ease;
        }
        .category-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(255, 149, 0, 0.2);
        }
        .category-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            position: relative;
            z-index: 2;
        }
        .category-card h3 {
            font-size: 1.2rem;
            font-weight: 700;
            position: relative;
            z-index: 2;
        }
        #categoriesLoading {
            grid-column: 1 / -1;
            text-align: center;
            color: #999;
            padding: 3rem 0;
        }
        .default-category {
            background: linear-gradient(135deg, var(--navy) 0%, rgba(26, 42, 71, 0.8) 100%);
            border-radius: 12px;
            padding: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            color: var(--white);
        }
        @media (max-width: 768px) {
            .carousel-content {
                grid-template-columns: 1fr;
                padding: 2rem 1rem;
            }
            .carousel-text h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-container">
            <div class="logo">
                <div class="logo-text">
                    <h1>Zupermart</h1>
                    <p>SHOP MORE. SAVE MORE.</p>
                </div>
            </div>
        </div>
    </header>

    <!-- CAROUSEL -->
    <div class="carousel-container" id="carouselContainer">
        <div class="carousel" id="carouselContent">
            <div class="carousel-slide active" id="defaultSlide">
                <div class="carousel-content">
                    <div class="carousel-text">
                        <h2>Welcome to Zupermart</h2>
                        <p>Discover amazing products and unbeatable prices on all your favorite items.</p>
                        <button class="carousel-btn" onclick="scrollToCategories()">Shop Now</button>
                    </div>
                    <div class="carousel-image">🛍️</div>
                </div>
            </div>
        </div>
        <div class="carousel-controls" id="carouselControls"></div>
    </div>

    <!-- CATEGORIES -->
    <section class="categories-section">
        <div class="section-header">
            <h2>Shop by Category</h2>
        </div>
        <div class="categories-container" id="categoriesContainer">
            <div id="categoriesLoading">Loading categories...</div>
        </div>
    </section>

    <script>
        const API_BASE = 'https://zupermart-api.amworkmanage.workers.dev';
        let categories = [];
        let banners = [];
        let currentCarouselSlide = 0;

        // Load categories on page load
        async function loadCategories() {
            try {
                const response = await fetch(`${API_BASE}/api/categories`);
                if (response.ok) {
                    categories = await response.json();
                    renderCategories();
                } else {
                    showDefaultCategories();
                }
            } catch (error) {
                console.error('Error loading categories:', error);
                showDefaultCategories();
            }
        }

        // Load banners for carousel
        async function loadBanners() {
            try {
                const response = await fetch(`${API_BASE}/api/media/banners`);
                if (response.ok) {
                    banners = await response.json();
                    renderCarousel();
                }
            } catch (error) {
                console.error('Error loading banners:', error);
            }
        }

        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            
            if (categories.length === 0) {
                showDefaultCategories();
                return;
            }

            container.innerHTML = categories.map(cat => `
                <div class="category-card">
                    <div class="category-icon">${cat.icon}</div>
                    <h3>${cat.name}</h3>
                </div>
            `).join('');
        }

        function showDefaultCategories() {
            const container = document.getElementById('categoriesContainer');
            const defaultCategories = [
                { icon: '📱', name: 'Electronics' },
                { icon: '👕', name: 'Clothing' },
                { icon: '🍕', name: 'Food & Beverages' },
                { icon: '🏠', name: 'Home & Garden' }
            ];
            container.innerHTML = defaultCategories.map(cat => `
                <div class="category-card">
                    <div class="category-icon">${cat.icon}</div>
                    <h3>${cat.name}</h3>
                </div>
            `).join('');
        }

        function renderCarousel() {
            const carouselContent = document.getElementById('carouselContent');
            const controls = document.getElementById('carouselControls');
            
            if (banners.length === 0) {
                setupCarouselControls(1);
                return;
            }

            // Add banner slides
            banners.forEach((banner, idx) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                if (idx === 0) slide.classList.add('active');
                slide.innerHTML = `
                    <div class="carousel-content">
                        <div class="carousel-text">
                            <h2>${banner.name.split('.')[0]}</h2>
                            <p>Special promotion - Browse our collection</p>
                            <button class="carousel-btn" onclick="scrollToCategories()">Explore Now</button>
                        </div>
                        <div class="carousel-image">📸</div>
                    </div>
                `;
                carouselContent.appendChild(slide);
            });

            setupCarouselControls(banners.length + 1);
            startCarouselAutoPlay();
        }

        function setupCarouselControls(count) {
            const controls = document.getElementById('carouselControls');
            controls.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const dot = document.createElement('div');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goToCarouselSlide(i);
                controls.appendChild(dot);
            }
        }

        function goToCarouselSlide(idx) {
            const slides = document.querySelectorAll('.carousel-slide');
            const dots = document.querySelectorAll('.carousel-dot');
            
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            
            slides[idx]?.classList.add('active');
            dots[idx]?.classList.add('active');
            currentCarouselSlide = idx;
        }

        function nextCarouselSlide() {
            const slides = document.querySelectorAll('.carousel-slide');
            currentCarouselSlide = (currentCarouselSlide + 1) % slides.length;
            goToCarouselSlide(currentCarouselSlide);
        }

        function startCarouselAutoPlay() {
            setInterval(nextCarouselSlide, 5000);
        }

        function scrollToCategories() {
            document.querySelector('.categories-section').scrollIntoView({ behavior: 'smooth' });
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadCategories();
            loadBanners();
        });
    </script>
</body>
</html>
