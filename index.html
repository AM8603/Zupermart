<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zupermart - Shop More. Save More.</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy: #1a2a47;
            --orange: #FF9500;
            --white: #ffffff;
            --light-gray: #f8f9fa;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            color: var(--text);
            line-height: 1.6;
            background-color: var(--light-gray);
        }
        
        /* ========== HEADER ========== */
        header {
            background: var(--white);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 1rem 2rem;
        }
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            text-decoration: none;
        }
        .logo-img {
            height: 50px;
            width: auto;
            border-radius: 4px;
        }
        .logo-text h1 {
            font-size: 1.5rem;
            color: var(--navy);
            font-weight: 800;
        }
        .logo-text p {
            font-size: 0.75rem;
            color: var(--orange);
            font-weight: 700;
            margin-top: 0.25rem;
        }
        
        /* ========== CAROUSEL ========== */
        .carousel-container {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(135deg, var(--navy) 0%, rgba(26, 42, 71, 0.9) 100%);
            overflow: hidden;
        }
        .carousel {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .carousel-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .carousel-slide.active {
            opacity: 1;
        }
        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .carousel-slide-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
        }
        .carousel-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .carousel-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .carousel-dot.active {
            background: var(--orange);
            transform: scale(1.3);
        }
        
        /* ========== CATEGORIES ========== */
        .categories-section {
            padding: 4rem 2rem;
            background: var(--white);
        }
        .section-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .section-header h2 {
            font-size: 2.5rem;
            color: var(--navy);
            margin-bottom: 1rem;
            font-weight: 800;
        }
        .section-header h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: var(--orange);
            border-radius: 2px;
            margin: 1rem auto 0;
        }
        .categories-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
        }
        .category-card {
            background: linear-gradient(135deg, var(--navy) 0%, rgba(26, 42, 71, 0.8) 100%);
            border-radius: 12px;
            padding: 2rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 180px;
            color: var(--white);
            text-align: center;
        }
        .category-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(255, 149, 0, 0.2);
        }
        .category-icon {
            font-size: 3rem;
            margin-bottom: 0.8rem;
        }
        .category-card h3 {
            font-size: 1rem;
            font-weight: 700;
        }
        
        /* ========== PRODUCTS ========== */
        .products-section {
            padding: 4rem 2rem;
            background: var(--light-gray);
        }
        .products-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
        }
        .product-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }
        .product-image {
            width: 100%;
            height: 200px;
            background: var(--light-gray);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-image-placeholder {
            font-size: 3rem;
        }
        .product-info {
            padding: 1.5rem;
        }
        .product-category {
            font-size: 0.8rem;
            color: var(--orange);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .product-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 0.5rem;
            white-space: normal;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .product-description {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 1rem;
            min-height: 40px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }
        .product-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--orange);
        }
        .product-stock {
            font-size: 0.8rem;
            color: var(--text-light);
        }
        
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 0;
            color: var(--text-light);
        }
        
        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .carousel-container {
                height: 300px;
            }
            .categories-container {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }
            .products-container {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1rem;
            }
            .section-header h2 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-container">
            <div class="logo">
                <img id="logoImage" class="logo-img" alt="Zupermart Logo" style="display: none;">
                <div class="logo-text">
                    <h1>Zupermart</h1>
                    <p>SHOP MORE. SAVE MORE.</p>
                </div>
            </div>
        </div>
    </header>

    <!-- CAROUSEL -->
    <div class="carousel-container" id="carouselContainer">
        <div class="carousel" id="carouselContent">
            <div class="carousel-slide active" id="defaultSlide">
                <div class="carousel-slide-overlay">
                    <div style="text-align: center; color: var(--white); z-index: 5; position: relative;">
                        <h2 style="font-size: 3rem; font-weight: 800; margin-bottom: 1rem;">Welcome to Zupermart</h2>
                        <p style="font-size: 1.2rem; margin-bottom: 2rem;">Discover amazing products and unbeatable prices</p>
                        <button style="background: var(--orange); color: white; border: none; padding: 1rem 2rem; border-radius: 6px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: all 0.3s;" onclick="scrollToProducts()">Shop Now</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="carousel-controls" id="carouselControls"></div>
    </div>

    <!-- CATEGORIES -->
    <section class="categories-section">
        <div class="section-header">
            <h2>Shop by Category</h2>
        </div>
        <div class="categories-container" id="categoriesContainer">
            <div class="empty-state">Loading categories...</div>
        </div>
    </section>

    <!-- PRODUCTS -->
    <section class="products-section">
        <div class="section-header">
            <h2>Featured Products</h2>
        </div>
        <div class="products-container" id="productsContainer">
            <div class="empty-state">Loading products...</div>
        </div>
    </section>

    <script>
        const API_BASE = 'https://zupermart-api.amworkmanage.workers.dev';
        let categories = [];
        let products = [];
        let banners = [];
        let currentCarouselSlide = 0;

        console.log('[v0] Storefront initializing...');

        // Load logo
        async function loadLogo() {
            try {
                const response = await fetch(`${API_BASE}/api/media/logo`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.url) {
                        document.getElementById('logoImage').src = data.url;
                        document.getElementById('logoImage').style.display = 'block';
                        console.log('[v0] Logo loaded:', data.url);
                    }
                }
            } catch (error) {
                console.error('[v0] Error loading logo:', error);
            }
        }

        // Load categories
        async function loadCategories() {
            try {
                const response = await fetch(`${API_BASE}/api/categories`);
                if (response.ok) {
                    categories = await response.json();
                    console.log('[v0] Categories loaded:', categories);
                    renderCategories();
                } else {
                    showDefaultCategories();
                }
            } catch (error) {
                console.error('[v0] Error loading categories:', error);
                showDefaultCategories();
            }
        }

        // Load products
        async function loadProducts() {
            try {
                const response = await fetch(`${API_BASE}/api/products`);
                if (response.ok) {
                    products = await response.json();
                    console.log('[v0] Products loaded:', products);
                    renderProducts();
                } else {
                    console.error('[v0] Products response not ok');
                    showEmptyProducts();
                }
            } catch (error) {
                console.error('[v0] Error loading products:', error);
                showEmptyProducts();
            }
        }

        // Load banners for carousel
        async function loadBanners() {
            try {
                const response = await fetch(`${API_BASE}/api/media/banners`);
                if (response.ok) {
                    banners = await response.json();
                    console.log('[v0] Banners loaded:', banners);
                    renderCarousel();
                } else {
                    console.log('[v0] No banners available');
                }
            } catch (error) {
                console.error('[v0] Error loading banners:', error);
            }
        }

        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            
            if (!categories || categories.length === 0) {
                showDefaultCategories();
                return;
            }

            container.innerHTML = categories.map(cat => `
                <div class="category-card">
                    <div class="category-icon">${cat.icon || '📦'}</div>
                    <h3>${cat.name}</h3>
                </div>
            `).join('');
        }

        function showDefaultCategories() {
            const container = document.getElementById('categoriesContainer');
            const defaultCategories = [
                { icon: '📱', name: 'Electronics' },
                { icon: '👕', name: 'Clothing' },
                { icon: '🍕', name: 'Food & Beverages' },
                { icon: '🏠', name: 'Home & Garden' }
            ];
            container.innerHTML = defaultCategories.map(cat => `
                <div class="category-card">
                    <div class="category-icon">${cat.icon}</div>
                    <h3>${cat.name}</h3>
                </div>
            `).join('');
        }

        function renderProducts() {
            const container = document.getElementById('productsContainer');
            
            if (!products || products.length === 0) {
                showEmptyProducts();
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image">
                        ${product.image ? `
                            <img src="${product.image}" alt="${product.name}">
                        ` : `
                            <div class="product-image-placeholder">📦</div>
                        `}
                    </div>
                    <div class="product-info">
                        ${product.category ? `<div class="product-category">${product.category}</div>` : ''}
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-description">${product.description || 'High quality product'}</p>
                        <div class="product-footer">
                            <div class="product-price">$${parseFloat(product.price).toFixed(2)}</div>
                            <div class="product-stock">${product.stock > 0 ? `${product.stock} in stock` : 'Out of stock'}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function showEmptyProducts() {
            const container = document.getElementById('productsContainer');
            container.innerHTML = '<div class="empty-state">No products available yet</div>';
        }

        function renderCarousel() {
            const carouselContent = document.getElementById('carouselContent');
            const controls = document.getElementById('carouselControls');
            
            if (!banners || banners.length === 0) {
                console.log('[v0] No banners to display');
                setupCarouselControls(1);
                return;
            }

            // Clear existing banner slides (keep default)
            const existingBanners = carouselContent.querySelectorAll('.carousel-slide:not(#defaultSlide)');
            existingBanners.forEach(slide => slide.remove());

            // Add banner slides
            banners.forEach((banner, idx) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                if (idx === 0) slide.classList.add('active');
                
                // Check if banner.url exists, otherwise try banner.key or banner
                const bannerUrl = banner.url || banner;
                
                slide.innerHTML = `
                    <img src="${bannerUrl}" alt="Banner ${idx + 1}" style="width: 100%; height: 100%; object-fit: cover;">
                `;
                carouselContent.appendChild(slide);
            });

            setupCarouselControls(banners.length + 1);
            startCarouselAutoPlay();
        }

        function setupCarouselControls(count) {
            const controls = document.getElementById('carouselControls');
            controls.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const dot = document.createElement('div');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goToCarouselSlide(i);
                controls.appendChild(dot);
            }
        }

        function goToCarouselSlide(idx) {
            const slides = document.querySelectorAll('.carousel-slide');
            const dots = document.querySelectorAll('.carousel-dot');
            
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            
            if (slides[idx]) slides[idx].classList.add('active');
            if (dots[idx]) dots[idx].classList.add('active');
            currentCarouselSlide = idx;
        }

        function nextCarouselSlide() {
            const slides = document.querySelectorAll('.carousel-slide');
            if (slides.length > 1) {
                currentCarouselSlide = (currentCarouselSlide + 1) % slides.length;
                goToCarouselSlide(currentCarouselSlide);
            }
        }

        function startCarouselAutoPlay() {
            setInterval(nextCarouselSlide, 5000);
        }

        function scrollToProducts() {
            document.querySelector('.products-section').scrollIntoView({ behavior: 'smooth' });
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            console.log('[v0] DOM Content Loaded');
            loadLogo();
            loadCategories();
            loadProducts();
            loadBanners();
        });
    </script>
</body>
</html>
